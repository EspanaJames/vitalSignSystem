<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="James España" />
    <title>Vital Sign System</title>
    <link rel="stylesheet" href="./assets/styles/indexBaseStyles.css" />
    <link rel="icon" type="image/x-icon" href="./assets/images/pulse.png" />
  </head>
  <body>
    <nav id="mainNav">
      <img src="./assets/images/temporaryLogo.png" alt="main logo" />
      <h1>Vital Sign System</h1>
    </nav>
    <main id="mainContent">
      <div id="shortDescription">
        <h3>AI-POWERED VITAL SIGN SYSTEM</h3>
      </div>
      <div id="callToAction"><h1>SCAN NOW!</h1></div>
      <div id="projectDescription">
        <h4>
          An AI-powered website that provides analysis for vitals collected by
          the automated vital sign identification system. Our AI suggests
          actions and steps to take, prior to taking your vital signs.
        </h4>
      </div>
      <div id="actionButtons">
        <button>
          <img src="./assets/images/scanQRImage.png" alt="scan" /><span
            >SCAN YOUR QR CODE</span
          >
        </button>
        <button>
          <img src="./assets/images/uploadQRImage.png" alt="upload" /><span
            >UPLOAD QR CODE</span
          >
        </button>
      </div>
    </main>
  </body>
</html>
